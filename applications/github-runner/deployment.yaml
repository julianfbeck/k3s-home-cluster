apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-runner
  namespace: github-actions
  labels:
    app: github-runner
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: github-runner
  template:
    metadata:
      labels:
        app: github-runner
    spec:
      restartPolicy: Always
      # Make sure /runner exists with correct ownership for the unprivileged runner user (UID 1001).
      initContainers:
        - name: chown-runner-dir
          image: busybox:1.36
          command: ['sh', '-c', 'chown -R 1001:1001 /runner']
          volumeMounts:
            - { name: state, mountPath: /runner }
      containers:
        - name: runner
          image: ghcr.io/actions/actions-runner:latest
          imagePullPolicy: Always
          command: ['bash', '-c']
          args:
            - |
              set -euo pipefail
              cd /runner
              if [ ! -f .runner ]; then
                echo "Registering runner k8s against https://github.com/${RUNNER_OWNER}"
                cp -r /home/runner/. /runner/
                ./config.sh --unattended --replace \
                  --url "https://github.com/${RUNNER_OWNER}" \
                  --token "${RUNNER_TOKEN}" \
                  --name "${RUNNER_NAME}" \
                  --labels "${RUNNER_LABELS}" \
                  --work _work
              else
                echo "Runner already configured, starting"
              fi
              exec ./run.sh
          env:
            - name: RUNNER_NAME
              value: k8s
            - name: RUNNER_OWNER
              value: Bejuforge
            - name: RUNNER_LABELS
              value: k8s,arm64,linux
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-runner-secrets
                  key: RUNNER_TOKEN
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1500m
              memory: 1500Mi
          volumeMounts:
            - name: state
              mountPath: /runner
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: runner-state
