apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-runner
  namespace: github-actions
  labels:
    app: github-runner
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: github-runner
  template:
    metadata:
      labels:
        app: github-runner
      annotations:
        # Belt-and-braces: descheduler's policy already excludes the
        # github-actions namespace, but this annotation tells the
        # DefaultEvictor to skip this pod even if the policy changes.
        # A running job would be killed mid-step if the pod is evicted.
        descheduler.alpha.kubernetes.io/evict: "false"
    spec:
      restartPolicy: Always
      containers:
        - name: runner
          image: myoung34/github-runner:latest
          imagePullPolicy: Always
          env:
            - name: RUNNER_NAME
              value: k8s
            - name: RUNNER_SCOPE
              value: org
            - name: ORG_NAME
              value: Bejuforge
            - name: LABELS
              value: k8s,arm64,linux
            - name: RUNNER_WORKDIR
              value: /runner/_work
            - name: EPHEMERAL
              value: "false"
            - name: DISABLE_AUTO_UPDATE
              value: "true"
            # ACCESS_TOKEN is a classic PAT with `admin:org`. The image mints
            # short-lived registration tokens against the org on every start,
            # so the runner re-registers cleanly across restarts.
            - name: ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-runner-secrets
                  key: ACCESS_TOKEN
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 3Gi
          volumeMounts:
            - name: state
              mountPath: /runner
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: runner-state
